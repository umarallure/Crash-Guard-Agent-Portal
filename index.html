  <body>
    <script>
      // Apply theme before React mounts to avoid a flash of the wrong color.
      // Default is dark; users toggle to light via the header button.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved !== 'light') document.documentElement.classList.add('dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
